name: AI Bubble Warning System - Market Snapshot

on:
  workflow_dispatch:
  schedule:
    # 台灣時間 21:50 (UTC 13:50)，週一到週五 — 搶在每日 22:00 預警掃描前完成
    - cron: '50 13 * * 1-5'

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Run warning snapshot script
        run: python3 warning_snapshot.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/warning_snapshot.json
          git diff --staged --quiet || git commit -m "chore: update warning snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
